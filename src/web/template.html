<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MapVFS Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e1e2e;--bg2:#181825;--bg3:#313244;--bg4:#45475a;
  --fg:#cdd6f4;--fg2:#a6adc8;--fg3:#6c7086;
  --blue:#89b4fa;--green:#a6e3a1;--yellow:#f9e2af;
  --red:#f38ba8;--mauve:#cba6f7;--teal:#94e2d5;--peach:#fab387;
  --font:'SF Mono','Cascadia Code','Fira Code',monospace;
}
html,body{height:100%;font:13px/1.5 var(--font);background:var(--bg);color:var(--fg)}
#app{display:grid;grid-template-rows:42px 1fr 28px;height:100vh}

/* Header */
header{display:flex;align-items:center;gap:12px;padding:0 12px;background:var(--bg2);border-bottom:1px solid var(--bg3)}
header h1{font-size:14px;color:var(--mauve);font-weight:600;white-space:nowrap}
header .file{color:var(--fg3);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header .search-box{margin-left:auto;display:flex;gap:4px}
header input{background:var(--bg3);border:1px solid var(--bg4);border-radius:4px;padding:4px 8px;color:var(--fg);font:12px var(--font);width:220px;outline:none}
header input:focus{border-color:var(--blue)}
header button,header select{background:var(--bg3);border:1px solid var(--bg4);border-radius:4px;padding:4px 10px;color:var(--fg2);font:11px var(--font);cursor:pointer}
header button:hover{background:var(--bg4);color:var(--fg)}
header button.active{background:var(--green);color:var(--bg);border-color:var(--green)}

/* Main */
main{display:grid;grid-template-columns:300px 1fr;overflow:hidden}

/* Tree Panel */
#tree-panel{background:var(--bg2);border-right:1px solid var(--bg3);overflow-y:auto;padding:8px 0}
.tree-node{cursor:pointer;white-space:nowrap;padding:1px 0 1px 0;user-select:none}
.tree-node:hover{background:var(--bg3)}
.tree-node.active{background:var(--bg3);color:var(--blue)}
.tree-label{display:inline-flex;align-items:center;gap:4px}
.tree-icon{width:16px;text-align:center;font-size:12px;flex-shrink:0}
.tree-name{font-size:12px}
.tree-tag{font-size:10px;color:var(--fg3);margin-left:4px}
.tree-children{display:none}
.tree-node.open > .tree-children{display:block}
.tree-toggle{display:inline-block;width:12px;text-align:center;color:var(--fg3);font-size:10px;flex-shrink:0}

/* Content Panel */
#content-panel{display:flex;flex-direction:column;overflow:hidden}
#breadcrumb{padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--bg3);font-size:12px;color:var(--fg3);display:flex;align-items:center;gap:2px;flex-shrink:0}
#breadcrumb span{cursor:pointer;color:var(--fg2)}
#breadcrumb span:hover{color:var(--blue);text-decoration:underline}
#breadcrumb .sep{color:var(--fg3);cursor:default}
#content-area{flex:1;overflow-y:auto;padding:12px}

/* JSON display */
.json-view{font-size:12px;line-height:1.6}
.json-key{color:var(--blue)}
.json-str{color:var(--green)}
.json-num{color:var(--peach)}
.json-bool{color:var(--mauve)}
.json-null{color:var(--fg3)}
.json-bracket{color:var(--fg2)}
.json-colon{color:var(--fg3)}

/* Summary card */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:12px}
.card-label{font-size:11px;color:var(--fg3);text-transform:uppercase;margin-bottom:4px}
.card-value{font-size:18px;font-weight:600;color:var(--fg)}
.card-value.blue{color:var(--blue)}
.card-value.green{color:var(--green)}
.card-value.mauve{color:var(--mauve)}
.card-value.peach{color:var(--peach)}

.entity-list{list-style:none;margin-top:12px}
.entity-list li{padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px}
.entity-list li:hover{background:var(--bg3)}
.entity-list .epath{color:var(--fg2)}
.entity-list .ecomps{color:var(--fg3);font-size:11px}

/* Search results */
.search-results{list-style:none}
.search-results li{padding:6px 8px;border-bottom:1px solid var(--bg3);cursor:pointer;font-size:12px}
.search-results li:hover{background:var(--bg3)}
.match-path{color:var(--blue)}
.match-detail{color:var(--fg3);font-size:11px;margin-top:2px}

/* Footer */
footer{display:flex;align-items:center;padding:0 12px;background:var(--bg2);border-top:1px solid var(--bg3);font-size:11px;color:var(--fg3);gap:16px}
footer .dirty{color:var(--yellow)}

/* Array summary badge */
.arr-badge{display:inline-block;background:var(--bg3);border:1px solid var(--bg4);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--teal);margin-left:4px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>MapVFS</h1>
    <span class="file" id="h-file"></span>
    <div class="search-box">
      <input id="search-input" placeholder="Search / Grep..." onkeydown="if(event.key==='Enter')doSearch()">
      <select id="search-mode"><option value="search">Search (glob)</option><option value="grep">Grep (regex)</option></select>
      <button onclick="doSearch()">Go</button>
      <button onclick="showSummary()">Summary</button>
      <button id="compact-btn" onclick="toggleCompact()">Compact: ON</button>
    </div>
  </header>
  <main>
    <div id="tree-panel"></div>
    <div id="content-panel">
      <div id="breadcrumb"></div>
      <div id="content-area"></div>
    </div>
  </main>
  <footer>
    <span id="f-entities"></span>
    <span id="f-components"></span>
    <span id="f-scripts"></span>
  </footer>
</div>
<script>
const API = '';
let summaryCache = null;
let compactMode = true;

async function api(endpoint, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const url = `${API}/api/${endpoint}${qs ? '?' + qs : ''}`;
  const r = await fetch(url);
  return r.json();
}

// ── Tree ──────────────────────────────────────────────
async function loadTree() {
  const data = await api('tree', {max_depth: 20});
  const panel = document.getElementById('tree-panel');
  panel.innerHTML = '';
  if (data.error) { panel.textContent = data.error; return; }
  panel.appendChild(buildTreeNode(data, 0, ''));
}

function buildTreeNode(node, depth, parentPath) {
  const div = document.createElement('div');
  div.className = 'tree-node' + (depth < 3 ? ' open' : '');

  const fullPath = node.path || parentPath;
  const label = document.createElement('div');
  label.className = 'tree-label';
  label.style.paddingLeft = (depth * 16 + 4) + 'px';

  const isDir = node.type === 'dir';
  const hasChildren = node.children && node.children.length > 0;

  // toggle
  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle';
  if (isDir && hasChildren) {
    toggle.textContent = div.classList.contains('open') ? '▾' : '▸';
    toggle.onclick = (e) => {
      e.stopPropagation();
      div.classList.toggle('open');
      toggle.textContent = div.classList.contains('open') ? '▾' : '▸';
    };
  }
  label.appendChild(toggle);

  // icon
  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  if (isDir) {
    icon.textContent = node.entity ? '🔹' : '📁';
  } else {
    const ct = node.component_type || '';
    icon.textContent = ct.startsWith('script.') ? '📜' : '📄';
  }
  label.appendChild(icon);

  // name
  const nameSpan = document.createElement('span');
  nameSpan.className = 'tree-name';
  nameSpan.textContent = node.name + (isDir ? '' : '');
  label.appendChild(nameSpan);

  // tag
  if (isDir && node.components && node.components.length) {
    const tag = document.createElement('span');
    tag.className = 'tree-tag';
    tag.textContent = `[${node.components.length}]`;
    label.appendChild(tag);
  }

  label.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll('.tree-node.active').forEach(el => el.classList.remove('active'));
    div.classList.add('active');
    if (isDir && hasChildren) {
      div.classList.add('open');
      toggle.textContent = '▾';
    }
    navigate(fullPath);
  };
  div.appendChild(label);

  // children container
  if (isDir && hasChildren) {
    const childDiv = document.createElement('div');
    childDiv.className = 'tree-children';
    for (const child of node.children) {
      childDiv.appendChild(buildTreeNode(child, depth + 1, ''));
    }
    div.appendChild(childDiv);
  }

  return div;
}

function toggleCompact() {
  compactMode = !compactMode;
  const btn = document.getElementById('compact-btn');
  btn.textContent = `Compact: ${compactMode ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', compactMode);
  if (lastPath) navigate(lastPath);
}

let lastPath = null;

// ── Navigation ────────────────────────────────────────
async function navigate(path) {
  lastPath = path;
  const params = {path};
  if (compactMode) params.compact = 'true';
  const data = await api('read', params);
  setBreadcrumb(path);
  const area = document.getElementById('content-area');

  if (data.error) { area.innerHTML = `<div style="color:var(--red)">${data.error}</div>`; return; }

  if (data.type === 'entity') {
    const ls = await api('ls', {path, detail: 'true'});
    let html = `<div class="json-view"><h3 style="color:var(--mauve);margin-bottom:8px">Entity: ${data.metadata.name || path}</h3>`;
    html += renderJSON(data.metadata);
    if (ls.items) {
      html += `<h4 style="color:var(--fg2);margin:16px 0 8px">Contents</h4><ul class="entity-list">`;
      for (const item of ls.items) {
        const ip = path.replace(/\/$/,'') + '/' + item.name;
        const icon = item.type === 'dir' ? '🔹' : (item.name === '_entity.json' ? '📋' : '📄');
        const extra = item.components ? ` [${item.components.join(', ')}]` : '';
        html += `<li onclick="navigate('${ip}')"><span>${icon}</span><span class="epath">${item.name}${item.type==='dir'?'/':''}</span><span class="ecomps">${extra}</span></li>`;
      }
      html += `</ul>`;
    }
    html += `</div>`;
    area.innerHTML = html;
  } else {
    let html = `<div class="json-view">`;
    const ct = data.metadata?.full_type || '';
    if (ct) html += `<div style="color:var(--fg3);margin-bottom:8px;font-size:11px">${ct}</div>`;
    html += renderJSON(data.content);
    html += `</div>`;
    area.innerHTML = html;
  }
}

function setBreadcrumb(path) {
  const bc = document.getElementById('breadcrumb');
  const parts = path.split('/').filter(Boolean);
  let html = `<span onclick="navigate('/')">/</span>`;
  let accum = '';
  for (let i = 0; i < parts.length; i++) {
    accum += '/' + parts[i];
    const p = accum;
    html += `<span class="sep">/</span><span onclick="navigate('${p}')">${parts[i]}</span>`;
  }
  bc.innerHTML = html;
}

// ── JSON Renderer ─────────────────────────────────────
function renderJSON(obj, indent = 0) {
  if (obj === null || obj === undefined) return `<span class="json-null">null</span>`;
  if (typeof obj === 'boolean') return `<span class="json-bool">${obj}</span>`;
  if (typeof obj === 'number') return `<span class="json-num">${obj}</span>`;
  if (typeof obj === 'string') return `<span class="json-str">"${escapeHTML(obj)}"</span>`;

  const pad = '  '.repeat(indent);
  const pad1 = '  '.repeat(indent + 1);

  if (Array.isArray(obj)) {
    if (obj.length === 0) return `<span class="json-bracket">[]</span>`;
    // Compact small arrays of primitives
    if (obj.length <= 4 && obj.every(v => typeof v !== 'object' || v === null)) {
      const items = obj.map(v => renderJSON(v, 0)).join(', ');
      return `<span class="json-bracket">[</span>${items}<span class="json-bracket">]</span>`;
    }
    let html = `<span class="json-bracket">[</span>\n`;
    for (let i = 0; i < obj.length; i++) {
      html += pad1 + renderJSON(obj[i], indent + 1);
      if (i < obj.length - 1) html += ',';
      html += '\n';
    }
    html += pad + `<span class="json-bracket">]</span>`;
    return html;
  }

  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return `<span class="json-bracket">{}</span>`;
    // Array summary from compact mode: {_count, _stats, _preview}
    if (obj._count !== undefined && obj._preview !== undefined) {
      let html = `<span class="arr-badge">${obj._count} items</span>`;
      if (obj._stats) {
        const s = obj._stats;
        if (s.bounds) {
          const b = s.bounds;
          html += ` <span class="arr-badge" style="color:var(--peach)">bounds (${b.min.x},${b.min.y})~(${b.max.x},${b.max.y})</span>`;
        }
        if (s.unique_indices !== undefined) html += ` <span class="arr-badge" style="color:var(--blue)">${s.unique_indices} unique</span>`;
        if (s.empty_cells) html += ` <span class="arr-badge" style="color:var(--fg3)">${s.empty_cells} empty</span>`;
        if (s.groups !== undefined) html += ` <span class="arr-badge" style="color:var(--blue)">${s.groups} group(s)</span>`;
      }
      html += '\n';
      html += pad + `<span class="json-bracket">[</span>\n`;
      for (let i = 0; i < obj._preview.length; i++) {
        html += pad1 + renderJSON(obj._preview[i], indent + 1);
        html += ',\n';
      }
      html += pad1 + `<span class="json-str">"... ${obj._count - obj._preview.length} more"</span>\n`;
      html += pad + `<span class="json-bracket">]</span>`;
      return html;
    }
    // Compact small objects (x,y,z / r,g,b)
    if (keys.length <= 4 && keys.every(k => typeof obj[k] !== 'object' || obj[k] === null)) {
      const items = keys.map(k => `<span class="json-key">"${k}"</span><span class="json-colon">: </span>${renderJSON(obj[k], 0)}`).join(', ');
      return `<span class="json-bracket">{</span>${items}<span class="json-bracket">}</span>`;
    }
    let html = `<span class="json-bracket">{</span>\n`;
    for (let i = 0; i < keys.length; i++) {
      const k = keys[i];
      html += `${pad1}<span class="json-key">"${escapeHTML(k)}"</span><span class="json-colon">: </span>${renderJSON(obj[k], indent + 1)}`;
      if (i < keys.length - 1) html += ',';
      html += '\n';
    }
    html += pad + `<span class="json-bracket">}</span>`;
    return html;
  }

  return String(obj);
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Search / Grep ─────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const mode = document.getElementById('search-mode').value;
  const data = await api(mode, {pattern: q});
  const area = document.getElementById('content-area');

  if (data.error) { area.innerHTML = `<div style="color:var(--red)">${data.error}</div>`; return; }

  if (!Array.isArray(data) || data.length === 0) {
    area.innerHTML = `<div style="color:var(--fg3)">No results for "${escapeHTML(q)}"</div>`;
    return;
  }

  let html = `<div style="color:var(--fg2);margin-bottom:8px">${data.length} result(s) for <b>${escapeHTML(q)}</b></div>`;
  html += `<ul class="search-results">`;
  for (const item of data) {
    const p = item.path;
    html += `<li onclick="navigate('${p}')"><div class="match-path">${escapeHTML(p)}</div>`;
    if (item.matches) {
      for (const m of item.matches.slice(0, 5)) {
        html += `<div class="match-detail">${escapeHTML(m.key)}: ${escapeHTML(String(m.value))}</div>`;
      }
      if (item.matches.length > 5) html += `<div class="match-detail">... +${item.matches.length - 5} more</div>`;
    }
    html += `</li>`;
  }
  html += `</ul>`;
  area.innerHTML = html;
  setBreadcrumb(`/[${mode}: ${q}]`);
}

// ── Summary ───────────────────────────────────────────
async function showSummary() {
  if (!summaryCache) summaryCache = await api('summary');
  const s = summaryCache;
  const area = document.getElementById('content-area');
  setBreadcrumb('/[Summary]');

  const isUI = s.asset_type === 'ui';
  let html = `<div class="summary-grid">
    <div class="card"><div class="card-label">File</div><div class="card-value">${s.file}</div></div>
    <div class="card"><div class="card-label">Type</div><div class="card-value mauve">${isUI ? 'UI (' + (s.ui_group_type||'') + ')' : 'Map (' + (s.tile_map_mode||'') + ')'}</div></div>
    <div class="card"><div class="card-label">Entities</div><div class="card-value green">${s.entity_count}</div></div>
    <div class="card"><div class="card-label">Scripts</div><div class="card-value peach">${s.scripts.length}</div></div>`;
  if (isUI) {
    html += `<div class="card"><div class="card-label">Buttons</div><div class="card-value blue">${s.buttons||0}</div></div>`;
    html += `<div class="card"><div class="card-label">Texts</div><div class="card-value blue">${s.texts||0}</div></div>`;
  }
  html += `<div class="card"><div class="card-label">Core Version</div><div class="card-value">${s.core_version}</div></div>
  </div>`;

  if (Object.keys(s.component_counts).length) {
    html += `<h4 style="color:var(--fg2);margin:12px 0 8px">Component Usage</h4>`;
    html += `<div class="json-view"><pre>`;
    const sorted = Object.entries(s.component_counts).sort((a,b) => b[1]-a[1]);
    for (const [name, count] of sorted) {
      const bar = '█'.repeat(Math.min(count, 20));
      html += `<span class="json-key">${name.padEnd(30)}</span> <span class="json-num">${String(count).padStart(3)}</span> <span style="color:var(--teal)">${bar}</span>\n`;
    }
    html += `</pre></div>`;
  }

  if (s.scripts.length) {
    html += `<h4 style="color:var(--fg2);margin:12px 0 8px">Scripts</h4><ul class="entity-list">`;
    for (const sc of s.scripts) {
      html += `<li><span>📜</span><span class="epath">${sc}</span></li>`;
    }
    html += `</ul>`;
  }

  if (s.entities.length) {
    html += `<h4 style="color:var(--fg2);margin:12px 0 8px">Entities</h4><ul class="entity-list">`;
    for (const e of s.entities) {
      html += `<li onclick="navigate('${e.path}')"><span>🔹</span><span class="epath">${e.name}</span><span class="ecomps">${e.components.join(', ')}</span></li>`;
    }
    html += `</ul>`;
  }

  area.innerHTML = html;
}

// ── Init ──────────────────────────────────────────────
async function init() {
  document.getElementById('compact-btn').classList.add('active');
  const s = await api('summary');
  summaryCache = s;
  document.getElementById('h-file').textContent = s.file;
  document.getElementById('f-entities').textContent = `Entities: ${s.entity_count}`;
  document.getElementById('f-components').textContent = `Components: ${Object.values(s.component_counts).reduce((a,b)=>a+b, 0)}`;
  document.getElementById('f-scripts').textContent = `Scripts: ${s.scripts.length}`;
  await loadTree();
  // auto-navigate to first entity
  if (s.entities.length) {
    const first = s.entities[0];
    navigate(first.path);
  }
}
init();
</script>
</div>
</body>
</html>
