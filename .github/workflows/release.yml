name: Release CLI

on:
  push:
    # Tag convention: cli-v* for the CLI, viewer-v* for the viewer. The
    # older bare `v[0-9]*` form is still honored; we avoid a plain `v*`
    # glob because it also matches `viewer-v*` and double-triggers
    # publish, causing the "cannot publish over previously published"
    # race.
    tags: ['cli-v*', 'v[0-9]*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build:cli
      - run: npm test
      - run: npm publish --access public --provenance -w @choigawoon/msw-vfs-cli
