[package]
name = "msw-vfs-viewer"
version = "0.2.0"
description = "MSW VFS Viewer — desktop viewer for MapleStory Worlds assets"
authors = ["choigawoon"]
license = "MIT"
repository = "https://github.com/choigawoon/msw-vfs-cli"
edition = "2021"
rust-version = "1.77"

[lib]
name = "msw_vfs_viewer_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
notify = "6"
notify-debouncer-full = "0.3"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
